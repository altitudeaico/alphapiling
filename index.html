<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Piling Automation - POC Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F7 100%);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
      padding: 0;
    }

    .pip {
      width: 28px; height: 28px; border-radius: 50%;
      background: #F5F5F7;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pip-inner {
      width: 10px; height: 10px; border-radius: 50%;
      background: #D1D1D6;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pip.active {
      background: linear-gradient(135deg, #FF6B35, #FF9500);
      box-shadow: 0 4px 12px rgba(255,107,53,0.4);
      transform: scale(1.15);
    }
    .pip.active .pip-inner {
      background: white;
      width: 8px; height: 8px;
    }
    .pip.done {
      background: #34C759;
      box-shadow: 0 2px 8px rgba(52,199,89,0.3);
    }
    .pip.done .pip-inner {
      background: white;
      width: 12px; height: 12px;
      border-radius: 2px;
      clip-path: polygon(20% 50%, 40% 70%, 80% 30%, 85% 35%, 40% 80%, 15% 55%);
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.1);
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mini-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.08);
    }

    .row-card {
      background: white;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 0 1px rgba(0,0,0,0.08);
      margin-bottom: 8px;
      animation: rowIn 0.3s ease;
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes rowIn {
      0% { opacity: 0; transform: translateX(-10px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes checkDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes ringGrow {
      to { transform: scale(1.8); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    #startBtn {
      background: #1d1d1f;
      color: white;
      border: none;
      padding: 18px 36px;
      border-radius: 980px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    #startBtn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    }
    #startBtn:active {
      transform: scale(0.98);
    }

    .stat-box {
      background: #F5F5F7;
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
    }
    .stat-num {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -1px;
      color: #1d1d1f;
    }
    .stat-label {
      font-size: 12px;
      color: #86868b;
      margin-top: 2px;
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #E8F8EE;
      color: #1B873F;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .reset-btn {
      margin-top: 28px;
      background: white;
      border: none;
      padding: 14px 32px;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      color: #1d1d1f;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }
    .reset-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>

<div id="root">
  <div id="hero" style="text-align: center; padding: 56px 24px 40px;">
    <div style="display: inline-flex; align-items: center; gap: 8px; background: white; padding: 8px 16px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.1); margin-bottom: 20px;">
      <div style="width: 8px; height: 8px; background: linear-gradient(135deg, #FF6B35, #FF9500); border-radius: 50%;"></div>
      <span style="font-size: 13px; font-weight: 500; color: #1d1d1f;">Alpha Piling Automation</span>
    </div>
    
    <h1 style="font-size: 48px; font-weight: 600; letter-spacing: -2px; margin: 0 0 12px 0; line-height: 1.08; color: #1d1d1f;">
      Inbox to Excel.<br>
      <span style="background: linear-gradient(90deg, #FF6B35, #FF9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Instantly.</span>
    </h1>
    
    <p style="font-size: 19px; color: #86868b; margin: 0 0 36px 0; font-weight: 400; letter-spacing: -0.3px;">
      45 minutes of admin. Done in 47 seconds.
    </p>
    
    <button id="startBtn" onclick="begin()">
      Start Demo
    </button>
    
    <p style="font-size: 12px; color: #86868b; margin-top: 16px;">Click to watch the magic happen</p>
  </div>

  <div id="journey" style="display: none; padding: 0 24px 40px;">
    
    <div style="display: flex; justify-content: center; margin-bottom: 32px;">
      <div style="display: inline-flex; align-items: center; background: white; padding: 12px 20px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.1); gap: 8px;">
        <div class="pip" data-i="0"><div class="pip-inner"></div></div>
        <div class="pip" data-i="1"><div class="pip-inner"></div></div>
        <div class="pip" data-i="2"><div class="pip-inner"></div></div>
        <div class="pip" data-i="3"><div class="pip-inner"></div></div>
        <div class="pip" data-i="4"><div class="pip-inner"></div></div>
        <div class="pip" data-i="5"><div class="pip-inner"></div></div>
        <div class="pip" data-i="6"><div class="pip-inner"></div></div>
        <div class="pip" data-i="7"><div class="pip-inner"></div></div>
      </div>
    </div>

    <div id="stageTitle" style="text-align: center; margin-bottom: 24px;">
      <div id="stageLabel" style="font-size: 13px; font-weight: 500; color: #FF6B35; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;">Step 1 of 8</div>
      <div id="stageName" style="font-size: 28px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px;">Scanning documents</div>
    </div>

    <div id="canvas" style="display: flex; justify-content: center;"></div>
    
  </div>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

const piles = [
  {ref:"P1", dia:450, len:"12.5", load:850, grid:"A1"},
  {ref:"P2", dia:450, len:"12.5", load:850, grid:"A2"},
  {ref:"P3", dia:600, len:"15.0", load:1200, grid:"A3"},
  {ref:"P4", dia:600, len:"15.0", load:1200, grid:"B1"},
  {ref:"P5", dia:450, len:"12.5", load:920, grid:"B2"},
  {ref:"P6", dia:750, len:"18.0", load:1850, grid:"B3"},
  {ref:"P7", dia:750, len:"18.0", load:1850, grid:"C1"},
  {ref:"P8", dia:450, len:"12.5", load:780, grid:"C2"},
  {ref:"P9", dia:600, len:"15.0", load:1350, grid:"C3"},
  {ref:"P10", dia:600, len:"15.0", load:1350, grid:"D1"},
  {ref:"P11", dia:450, len:"14.0", load:950, grid:"D2"},
  {ref:"P12", dia:900, len:"20.0", load:2400, grid:"D3"}
];

const stages = [
  {label: 'Step 1 of 8', name: 'Scanning documents'},
  {label: 'Step 2 of 8', name: 'Classifying files'},
  {label: 'Step 3 of 8', name: 'Extracting pile data'},
  {label: 'Step 4 of 8', name: 'Generating Excel'},
  {label: 'Step 5 of 8', name: 'Organising Drive'},
  {label: 'Step 6 of 8', name: 'Updating tracker'},
  {label: 'Step 7 of 8', name: 'Sending reply'},
  {label: 'Complete', name: 'All done!'},
];

function setStep(n) {
  document.querySelectorAll('.pip').forEach((p,i) => {
    p.classList.remove('active','done');
    if (i < n) p.classList.add('done');
    else if (i === n) p.classList.add('active');
  });
  if (stages[n]) {
    document.getElementById('stageLabel').textContent = stages[n].label;
    document.getElementById('stageName').textContent = stages[n].name;
  }
}

const canvas = () => document.getElementById('canvas');

async function begin() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('journey').style.display = 'block';
  
  await scanStage();
  await classifyStage();
  await extractStage();
  await excelStage();
  await organiseStage();
  await trackStage();
  await replyStage();
  await completeStage();
}

async function scanStage() {
  setStep(0);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
      <div style="position: relative; width: 140px; height: 140px; margin: 0 auto 24px;">
        <svg width="140" height="140" style="transform: rotate(-90deg);">
          <circle cx="70" cy="70" r="62" fill="none" stroke="#F5F5F7" stroke-width="8"/>
          <circle id="arc" cx="70" cy="70" r="62" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="390" stroke-dashoffset="390" style="transition: stroke-dashoffset 0.08s linear; filter: drop-shadow(0 2px 4px rgba(255,107,53,0.3));"/>
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FF9500"/></linearGradient></defs>
        </svg>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
          <div id="pct" style="font-size: 40px; font-weight: 600; letter-spacing: -2px; color: #1d1d1f;">0</div>
        </div>
      </div>
      <div style="font-size: 15px; color: #86868b;" id="scanLabel">Reading tender documents...</div>
      <div style="margin-top: 20px; display: flex; justify-content: center; gap: 8px;">
        <span style="background: #F5F5F7; padding: 6px 12px; border-radius: 8px; font-size: 12px; color: #86868b;">📄 147 pages</span>
        <span style="background: #F5F5F7; padding: 6px 12px; border-radius: 8px; font-size: 12px; color: #86868b;">📎 7 files</span>
      </div>
    </div>
  `;
  const arc = document.getElementById('arc');
  const pct = document.getElementById('pct');
  const label = document.getElementById('scanLabel');
  for (let i = 0; i <= 147; i += 3) {
    arc.style.strokeDashoffset = 390 - (390 * i / 147);
    pct.textContent = i;
    if (i < 40) label.textContent = 'Reading structural drawings...';
    else if (i < 90) label.textContent = 'Processing specifications...';
    else label.textContent = 'Analysing soil reports...';
    await sleep(22);
  }
  pct.textContent = '147';
  label.textContent = 'Scan complete!';
  await sleep(500);
}

async function classifyStage() {
  setStep(1);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 420px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div>
          <div style="font-size: 15px; color: #86868b;">Found</div>
          <div style="font-size: 28px; font-weight: 600; color: #1d1d1f; letter-spacing: -1px;">6 relevant files</div>
        </div>
        <div style="width: 52px; height: 52px; background: linear-gradient(135deg, #34C759, #30D158); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(52,199,89,0.3);">
          <span style="font-size: 24px;">📑</span>
        </div>
      </div>
      <div id="docList"></div>
    </div>
  `;
  const docs = [
    {name: 'STR-102 Pile Schedule', type: 'Pile drawing'},
    {name: 'STR-105 Load Table', type: 'Separate load table'},
    {name: 'Soil Investigation', type: 'Geotechnical report'},
    {name: 'STR-101 Foundation', type: 'Pile drawing'},
  ];
  const list = document.getElementById('docList');
  for (const doc of docs) {
    list.innerHTML += `
      <div class="row-card" style="display: flex; align-items: center; gap: 14px;">
        <div style="width: 40px; height: 40px; background: #E8F8EE; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div style="flex: 1;">
          <div style="font-size: 15px; font-weight: 500; color: #1d1d1f;">${doc.name}</div>
          <div style="font-size: 13px; color: #34C759;">${doc.type}</div>
        </div>
      </div>
    `;
    await sleep(250);
  }
  list.innerHTML += `
    <div style="text-align: center; padding: 12px; color: #86868b; font-size: 13px;">
      141 other files skipped
    </div>
  `;
  await sleep(600);
}

async function extractStage() {
  setStep(2);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 540px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div id="extStatus">
          <div style="font-size: 15px; color: #86868b;">Extracting</div>
          <div style="font-size: 20px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px;">Processing pile P1...</div>
        </div>
        <div id="counter" style="background: linear-gradient(135deg, #FF6B35, #FF9500); color: white; padding: 8px 18px; border-radius: 20px; font-size: 15px; font-weight: 600; box-shadow: 0 4px 12px rgba(255,107,53,0.3);">0 / 12</div>
      </div>
      <div style="background: #F5F5F7; border-radius: 14px; overflow: hidden;">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; padding: 12px 18px; font-size: 12px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #E8E8ED;">
          <div>Pile</div><div>Diameter</div><div>Length</div><div>Load</div><div>Grid</div>
        </div>
        <div id="rows" style="max-height: 240px; overflow: hidden;"></div>
      </div>
    </div>
  `;
  const rows = document.getElementById('rows');
  const counter = document.getElementById('counter');
  const status = document.getElementById('extStatus');
  for (let i = 0; i < piles.length; i++) {
    const p = piles[i];
    status.innerHTML = `<div style="font-size: 15px; color: #86868b;">Extracting</div><div style="font-size: 20px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px;">Processing pile ${p.ref}...</div>`;
    rows.innerHTML += `
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; padding: 14px 18px; font-size: 14px; background: white; border-bottom: 1px solid #F5F5F7; animation: rowIn 0.25s ease;">
        <div style="font-weight: 600; color: #1d1d1f;">${p.ref}</div>
        <div style="color: #86868b;">${p.dia}mm</div>
        <div style="color: #86868b;">${p.len}m</div>
        <div style="font-weight: 600; color: #34C759;">${p.load} kN</div>
        <div style="color: #86868b;">${p.grid}</div>
      </div>
    `;
    counter.textContent = `${i + 1} / 12`;
    await sleep(140);
  }
  status.innerHTML = `<div style="font-size: 15px; color: #34C759;">Complete</div><div style="font-size: 20px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px;">All piles extracted</div>`;
  await sleep(500);
}

async function excelStage() {
  setStep(3);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
      <div style="width: 80px; height: 80px; margin: 0 auto 20px; background: linear-gradient(135deg, #34C759, #30D158); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(52,199,89,0.3); animation: float 2s ease infinite;">
        <span style="font-size: 36px;">📊</span>
      </div>
      <div style="font-size: 22px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; letter-spacing: -0.5px;">Excel generated</div>
      <div style="font-size: 15px; color: #86868b; margin-bottom: 24px;">Pile_Schedule_Riverside.xlsx</div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
        <div class="stat-box"><div class="stat-num">12</div><div class="stat-label">Piles</div></div>
        <div class="stat-box"><div class="stat-num">5</div><div class="stat-label">Columns</div></div>
        <div class="stat-box"><div class="stat-num" style="color: #34C759;">✓</div><div class="stat-label">Ready</div></div>
      </div>
    </div>
  `;
  await sleep(1200);
}

async function organiseStage() {
  setStep(4);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 380px;">
      <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 20px;">
        <div style="width: 52px; height: 52px; background: linear-gradient(135deg, #FBBC04, #F9AB00); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(251,188,4,0.3);">
          <span style="font-size: 26px;">📁</span>
        </div>
        <div>
          <div style="font-size: 17px; font-weight: 600; color: #1d1d1f;">Riverside Development Ph2</div>
          <div style="font-size: 14px; color: #86868b;">Wilson Contractors • Today</div>
        </div>
      </div>
      <div id="folders"></div>
    </div>
  `;
  const folders = [
    {name: '01_Enquiry_Email', badge: null},
    {name: '02_Drawings', badge: '4 files', color: '#34C759'},
    {name: '03_Soil_Investigation', badge: '1 file', color: '#34C759'},
    {name: '04_Specifications', badge: null},
    {name: '05_Extracted_Schedules', badge: 'Excel', color: '#FF9500'},
    {name: '06_Pricing', badge: null},
  ];
  const container = document.getElementById('folders');
  for (const f of folders) {
    container.innerHTML += `
      <div class="row-card" style="display: flex; align-items: center; gap: 12px;">
        <span style="font-size: 18px;">📂</span>
        <span style="flex: 1; font-size: 14px; font-weight: 500; color: #1d1d1f;">${f.name}</span>
        ${f.badge ? `<span style="background: ${f.color}15; color: ${f.color}; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;">${f.badge}</span>` : ''}
      </div>
    `;
    await sleep(100);
  }
  await sleep(500);
}

async function trackStage() {
  setStep(5);
  canvas().innerHTML = `
    <div class="card" style="width: 100%; max-width: 500px;">
      <div style="margin-bottom: 20px;">
        <div style="font-size: 15px; color: #86868b;">Tender Tracker</div>
        <div style="font-size: 20px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px;">New row added</div>
      </div>
      <div style="background: #F5F5F7; border-radius: 14px; overflow: hidden;">
        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; padding: 12px 18px; font-size: 12px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px;">
          <div>Project</div><div>Client</div><div>Due</div><div>Status</div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; padding: 16px 18px; background: linear-gradient(90deg, #FFF5F0, white); border-left: 4px solid #FF6B35; animation: rowIn 0.4s ease;">
          <div style="font-weight: 600; color: #1d1d1f;">Riverside Ph2</div>
          <div style="color: #86868b;">Wilson</div>
          <div style="color: #86868b;">28 Mar</div>
          <div><span style="background: linear-gradient(135deg, #FF6B35, #FF9500); color: white; padding: 4px 12px; border-radius: 10px; font-size: 12px; font-weight: 500;">New</span></div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; padding: 14px 18px; background: white; font-size: 14px; opacity: 0.7;">
          <div>Canary Wharf</div><div style="color: #86868b;">CW Dev</div><div style="color: #86868b;">24 Mar</div>
          <div><span style="background: #E8F4FD; color: #0071E3; padding: 4px 12px; border-radius: 10px; font-size: 12px;">Pricing</span></div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; padding: 14px 18px; background: white; font-size: 14px; opacity: 0.7;">
          <div>Manchester</div><div style="color: #86868b;">ASM</div><div style="color: #86868b;">22 Mar</div>
          <div><span style="background: #E8F8EE; color: #1B873F; padding: 4px 12px; border-radius: 10px; font-size: 12px;">Sent</span></div>
        </div>
      </div>
    </div>
  `;
  await sleep(1200);
}

async function replyStage() {
  setStep(6);
  canvas().innerHTML = `
